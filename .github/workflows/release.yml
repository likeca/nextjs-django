# GitHub Actions - Repository secrets
# HOST
# PORT
# USERNAME
# FOLDER
# PRIVATE_KEY
# GHCR_TOKEN

# Ubuntu: Add "CASignatureAlgorithms +ssh-rsa" to /etc/ssh/sshd_config
# Ubuntu: Add id_rsa.pub to authorized_keys

name: Release to nextjs.ottawastem.com

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Get current date
        id: date
        run: echo "TODAY=$(date +'%Y.%m.%d')" >> $GITHUB_ENV

      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build backend
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.actor }}/nextjs-django-backend:${{ env.TODAY }}
            ghcr.io/${{ github.actor }}/nextjs-django-backend:latest

      - name: Build frontend
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.actor }}/nextjs-django-frontend:${{ env.TODAY }}
            ghcr.io/${{ github.actor }}/nextjs-django-frontend:latest

      - name: Remote ssh
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.PRIVATE_KEY }}
          port: ${{ secrets.PORT }}
          script: |
            # 1. Update code from github
            cd /home/${{ secrets.USERNAME }}/${{ secrets.FOLDER }}/ && /usr/bin/git pull

            # 2. Docker compose restart
            cd /home/${{ secrets.USERNAME }}/${{ secrets.FOLDER }}/ && docker compose down && docker compose pull && docker compose up -d
