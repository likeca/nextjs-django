# GitHub Actions - Repository secrets
# HOST
# PORT
# USERNAME
# FOLDER
# PRIVATE_KEY
# DOCKERHUB_USERNAME
# DOCKERHUB_TOKEN

# Ubuntu: Add "CASignatureAlgorithms +ssh-rsa" to /etc/ssh/sshd_config
# Ubuntu: Add id_rsa.pub to authorized_keys

name: Release to nextjs.ottawastem.com

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push backend
        uses: docker/build-push-action@v7
        with:
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/NextJS-Django/backend/django:latest

      - name: Build and push frontend
        uses: docker/build-push-action@v7
        with:
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/NextJS-Django/frontend/nextjs:latest

      - name: Remote ssh
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.PRIVATE_KEY }}
          port: ${{ secrets.PORT }}
          script: |
            # 1. Update code from github
            cd /home/${{ secrets.USERNAME }}/${{ secrets.FOLDER }}/ && /usr/bin/git pull

            # 2. Docker compose restart
            cd /home/${{ secrets.USERNAME }}/${{ secrets.FOLDER }}/ && docker compose down && docker compose pull && docker compose up -d
